name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      - name: Prepare deploy artifact
        run: |
          # Remove dev/local files before upload
          rm -rf .git .github .env .env.example .editorconfig .gitattributes .gitignore
          rm -rf tests phpunit.xml .phpunit.result.cache
          rm -rf node_modules package.json package-lock.json vite.config.js
          rm -rf docker-compose.yml .phpcd.vim .DS_Store
          rm -rf .claude .a5c .scribe
          rm -rf _ide_helper.php _ide_helper_models.php .autoload.php
          rm -rf README.md

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_PATH }}
          local-dir: ./
          exclude: |
            .git/**
            .github/**
            .env
            .env.*
            tests/**
            node_modules/**
            .phpunit.result.cache
            docker-compose.yml


